<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#0a0a1a"/>
  <rect x="2" y="2" width="60" height="60" rx="6" fill="none" stroke="#4a4a6a" stroke-width="2"/>
  <!-- Mine body -->
  <circle cx="32" cy="34" r="13" fill="#1a1a2e" stroke="#ff006e" stroke-width="2" filter="url(#glow)"/>
  <!-- Spikes -->
  <line x1="32" y1="16" x2="32" y2="22" stroke="#ff006e" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="32" y1="46" x2="32" y2="52" stroke="#ff006e" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="14" y1="34" x2="20" y2="34" stroke="#ff006e" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="44" y1="34" x2="50" y2="34" stroke="#ff006e" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="19.3" y1="21.3" x2="23.5" y2="25.5" stroke="#ff006e" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="40.5" y1="42.5" x2="44.7" y2="46.7" stroke="#ff006e" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="44.7" y1="21.3" x2="40.5" y2="25.5" stroke="#ff006e" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="23.5" y1="42.5" x2="19.3" y2="46.7" stroke="#ff006e" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Inner highlight -->
  <circle cx="28" cy="30" r="4" fill="rgba(255,255,255,0.15)"/>
</svg>
